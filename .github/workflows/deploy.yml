# .github/workflows/deploy.yml
#
# Build & Deploy: Lentago Labs landing -> ECR -> ECS Fargate (solidago platform)
#
# Builds the Astro static site, packages it into the nginx container, pushes to
# ECR, and rolls the ECS service. Authenticates via the solidago platform's
# GitHub OIDC role (no long-lived AWS credentials). The ECR repo, ECS cluster/
# service, and the OIDC trust for this repo are provisioned by
# solidago (modules/site).
#
# >>> LIVE as of 2026-06-30. The ECR repo `solidago-dev-lentago`, the ECS service
# `solidago-dev-lentago`, and the OIDC trust for THIS repo
# (lentago/site-lentago-dev, née lentagolabs-dev) are provisioned in solidago (née foundry-platform-demo)
# (modules/site), mirroring the `site_pitzilabs` entry. Every push to `main` now
# builds, pushes to ECR, and rolls the ECS service; `workflow_dispatch` is kept
# for manual redeploys.
#
# >>> 2026-07-08: the platform renamed all `foundry-dev-*` AWS resources to the
# `solidago-dev-*` codename (solidago #102), which recreated the ECR repo/ECS
# service/OIDC role under new names and left this repo's deploy pointing at the
# now-deleted `foundry-dev-*` names — the site 503'd on an empty ECR repo. The
# env block below tracks the current `solidago-dev-*` names.

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: solidago-dev-lentago
  ECS_CLUSTER: solidago-dev-cluster
  ECS_SERVICE: solidago-dev-lentago
  AWS_ROLE_ARN: arn:aws:iam::365184644049:role/solidago-dev-github-actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPO:latest \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG \
            .
          docker push $REGISTRY/$ECR_REPO:latest
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION \
            --no-cli-pager

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
